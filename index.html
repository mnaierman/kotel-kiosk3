<!DOCTYPE html>
<html>
<head>
  <title>Kotel Live Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    iframe {
      border: none;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <iframe
    src="https://thekotel.org/en/connect-remotely-to-the-western-wall/#live"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>

  <span id="heartbeat" style="display:none;"></span>

  <script>
    setInterval(() => {
      document.getElementById("heartbeat").innerText = Date.now();
    }, 10000);
  </script>
</body>
</html>
